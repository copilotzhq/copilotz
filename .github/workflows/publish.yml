name: Publish
on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.8.2
      - name: Verify packed consumer types
        run: deno test --allow-all database/packed-types.test.ts
      - name: Publish package
        run: deno publish
